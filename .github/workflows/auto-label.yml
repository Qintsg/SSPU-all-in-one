# 自动 Label — 根据文件路径给 PR 打标签
name: Auto Label

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const commitItems = await github.paginate(
              github.rest.pulls.listCommits,
              {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              },
            );

            const issueNumbers = new Set();

            function addIssue(number) {
              if (!number) return;
              const parsed = Number(number);
              if (!Number.isInteger(parsed) || parsed <= 0) return;
              issueNumbers.add(parsed);
            }

            function addRange(start, end) {
              const parsedStart = Number(start);
              const parsedEnd = Number(end);
              if (!Number.isInteger(parsedStart) || !Number.isInteger(parsedEnd)) {
                return;
              }
              if (parsedStart <= 0 || parsedEnd <= 0 || parsedEnd < parsedStart) {
                return;
              }
              if (parsedEnd - parsedStart > 50) return;
              for (let current = parsedStart; current <= parsedEnd; current += 1) {
                issueNumbers.add(current);
              }
            }

            function collectIssueRefs(text) {
              if (!text) return;

              for (const match of text.matchAll(/#(\d+)/g)) {
                addIssue(match[1]);
              }

              for (const match of text.matchAll(/\bissues?[-_/](\d+)-(\d+)\b/gi)) {
                addRange(match[1], match[2]);
              }

              for (const match of text.matchAll(/\bissues?[-_/](\d+)\b/gi)) {
                addIssue(match[1]);
              }
            }

            collectIssueRefs(pr.title || '');
            collectIssueRefs(pr.head.ref || '');
            collectIssueRefs(pr.body || '');
            for (const commitItem of commitItems) {
              collectIssueRefs(commitItem.commit?.message || '');
            }

            if (issueNumbers.size === 0) {
              core.info('No issue references detected.');
              return;
            }

            const currentBody = pr.body || '';
            const missingIssues = [...issueNumbers]
              .sort((left, right) => left - right)
              .filter((issueNumber) => {
                const closingPattern = new RegExp(
                  `\\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\\s+#${issueNumber}\\b`,
                  'i',
                );
                return !closingPattern.test(currentBody);
              });

            if (missingIssues.length === 0) {
              core.info('All detected issues are already linked in PR body.');
              return;
            }

            const closingLines = missingIssues
              .map((issueNumber) => `Closes #${issueNumber}`)
              .join('\n');

            const issueSectionPattern =
              /(##\s*关联 Issue\s*\n+)([\s\S]*?)(\n##\s+|\n---|\s*$)/;

            let nextBody = currentBody;
            if (issueSectionPattern.test(currentBody)) {
              nextBody = currentBody.replace(
                issueSectionPattern,
                (_match, heading, sectionBody, tail) => {
                  const normalizedSectionBody = (sectionBody || '')
                    .split('\n')
                    .map((line) => line.trim())
                    .filter((line) => line.length > 0)
                    .filter((line) => !/^Closes\s+#\s*$/i.test(line))
                    .filter((line) => !/^关联 Issue：#\s*$/i.test(line))
                    .join('\n');
                  const trimmedSectionBody = normalizedSectionBody.trim();
                  const preservedLines = trimmedSectionBody
                    ? `${trimmedSectionBody}\n${closingLines}`
                    : closingLines;
                  return `${heading}${preservedLines}\n\n${tail.trimStart()}`;
                },
              );
            } else {
              const trimmedBody = currentBody.trimEnd();
              nextBody = `${trimmedBody}\n\n## 关联 Issue\n\n${closingLines}\n`;
            }

            if (nextBody === currentBody) {
              core.info('PR body unchanged after normalization.');
              return;
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr.number,
              body: nextBody,
            });
            core.info(`Linked issues: ${missingIssues.join(', ')}`);
