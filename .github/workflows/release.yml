# 全平台 Release 工作流
# PR 合并且带 release 标签时发布，也支持手动发版。
name: Build & Release

on:
  pull_request:
    types: [closed]
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 0.1.5-alpha)'
        required: true
        default: '0.1.5-alpha'

env:
  FLUTTER_VERSION: '3.41.7'

jobs:
  build-windows:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            installer_script: .github\installer\windows-x64.iss
            bundle_path: build\windows\x64\runner\Release
            output_file: sspu-all-in-one-windows-x64-setup.exe
            artifact_name: windows-x64-installer
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 准备版本号
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $releaseVersion = '${{ github.event.inputs.version }}'
          } else {
            $versionLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$'
            $releaseVersion = $versionLine.Matches[0].Groups[1].Value.Split('+')[0]
          }
          "APP_VERSION=$releaseVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Windows ${{ matrix.arch }}
        run: flutter build windows --release

      - name: 安装 Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: 生成 Windows 安装器
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          if (-not (Test-Path '${{ matrix.bundle_path }}')) {
            throw 'Windows bundle path not found: ${{ matrix.bundle_path }}'
          }
          $innoCompiler = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          & $innoCompiler '${{ matrix.installer_script }}'

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.output_file }}

  build-linux:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            target_platform: linux-x64
            bundle_path: build/linux/x64/release/bundle
            output_file: sspu-all-in-one-linux-x64.tar.gz
            artifact_name: linux-x64-bundle
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: 安装 Linux 依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libnotify-dev libayatana-appindicator3-dev

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Linux ${{ matrix.arch }}
        run: flutter build linux --release --target-platform ${{ matrix.target_platform }}

      - name: 校验 Linux 主程序可执行权限
        run: |
          linux_executable="${{ matrix.bundle_path }}/sspu_all_in_one"
          if [ ! -f "$linux_executable" ]; then
            echo "未找到 Linux 主程序: $linux_executable" >&2
            exit 1
          fi

          chmod +x "$linux_executable"
          stat -c '%A %n' "$linux_executable"

          if [ ! -x "$linux_executable" ]; then
            echo "Linux 主程序缺少可执行权限" >&2
            exit 1
          fi

      - name: 打包 Linux 运行目录
        run: |
          cd "${{ matrix.bundle_path }}"
          tar -czf "$GITHUB_WORKSPACE/${{ matrix.output_file }}" .

      - name: 校验 Linux 压缩包中的可执行权限
        run: |
          tar -tvzf "$GITHUB_WORKSPACE/${{ matrix.output_file }}" | grep '^-rwxr-xr-x .* ./sspu_all_in_one$'

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_file }}

  build-macos:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 macOS universal
        run: flutter build macos --release

      - name: 生成 macOS DMG
        run: |
          macos_app_bundle="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$macos_app_bundle" ]; then
            echo "未找到 macOS .app 产物" >&2
            exit 1
          fi
          hdiutil create \
            -volname "SSPU All-in-One" \
            -srcfolder "$macos_app_bundle" \
            -ov \
            -format UDZO \
            "$GITHUB_WORKSPACE/sspu-all-in-one-macos-universal.dmg"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: macos-universal-dmg
          path: sspu-all-in-one-macos-universal.dmg

  build-ios:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 iOS arm64 未签名应用
        run: flutter build ios --release --no-codesign

      - name: 打包 iOS 未签名应用
        run: |
          tar -czf "$GITHUB_WORKSPACE/sspu-all-in-one-ios-arm64-unsigned-app.tar.gz" -C build/ios/iphoneos Runner.app

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ios-arm64-unsigned-app
          path: sspu-all-in-one-ios-arm64-unsigned-app.tar.gz

  build-android:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Android arm32 / arm64 / x64 APK
        run: flutter build apk --release --target-platform android-arm,android-arm64,android-x64 --split-per-abi

      - name: 整理 APK 产物
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/sspu-all-in-one-android-arm32.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/sspu-all-in-one-android-arm64.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk dist/sspu-all-in-one-android-x64.apk

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: android-apk
          path: |
            dist/sspu-all-in-one-android-arm32.apk
            dist/sspu-all-in-one-android-arm64.apk
            dist/sspu-all-in-one-android-x64.apk

  build-web:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: js
            build_args: ''
            output_dir: build/web-js
            output_file: sspu-all-in-one-web-js.tar.gz
            artifact_name: web-js-bundle
          - mode: wasm
            build_args: '--wasm'
            output_dir: build/web-wasm
            output_file: sspu-all-in-one-web-wasm.tar.gz
            artifact_name: web-wasm-bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Web ${{ matrix.mode }}
        run: flutter build web --release ${{ matrix.build_args }} --output ${{ matrix.output_dir }}

      - name: 打包 Web ${{ matrix.mode }} 产物
        run: |
          cd "${{ matrix.output_dir }}"
          tar -czf "$GITHUB_WORKSPACE/${{ matrix.output_file }}" .

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_file }}

  create-release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    needs: [build-windows, build-linux, build-macos, build-ios, build-android, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: 提取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            release_version=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
            echo "version=$release_version" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: 创建 Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## SSPU All-in-One v${{ steps.version.outputs.version }}

            上海第二工业大学校园综合服务应用。

            ### Release 产物
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows x64 | `sspu-all-in-one-windows-x64-setup.exe` | 安装器 |
            | Android arm32 | `sspu-all-in-one-android-arm32.apk` | APK 安装包 |
            | Android arm64 | `sspu-all-in-one-android-arm64.apk` | APK 安装包 |
            | Android x64 | `sspu-all-in-one-android-x64.apk` | APK 安装包 |
            | iOS arm64 | `sspu-all-in-one-ios-arm64-unsigned-app.tar.gz` | 未签名应用包，需签名后安装 |
            | macOS universal | `sspu-all-in-one-macos-universal.dmg` | 同时支持 x64 与 arm64，未签名 |
            | Linux x64 | `sspu-all-in-one-linux-x64.tar.gz` | 运行目录压缩包 |
            | Web JavaScript | `sspu-all-in-one-web-js.tar.gz` | 静态站点压缩包 |
            | Web WebAssembly | `sspu-all-in-one-web-wasm.tar.gz` | 静态站点压缩包 |

            ### 平台说明
            - Android 产物按 arm32、arm64、x64 拆分，减少单个安装包体积。
            - 当前仓库 Release 工作流已验证 Windows x64 与 Linux x64 桌面产物。
            - iOS 没有仓库签名证书，Release 提供未签名应用压缩包。
            - Linux 与 Web 暂无仓库内安装器配置，保留压缩包形式。
            - Linux 压缩包建议使用 `tar -xzf` 解压；若使用不保留 Unix 权限的图形工具解压后无法直接运行，请执行 `chmod +x sspu_all_in_one` 后再启动。
          draft: false
          prerelease: true
          files: |
            artifacts/windows-x64-installer/sspu-all-in-one-windows-x64-setup.exe
            artifacts/android-apk/sspu-all-in-one-android-arm32.apk
            artifacts/android-apk/sspu-all-in-one-android-arm64.apk
            artifacts/android-apk/sspu-all-in-one-android-x64.apk
            artifacts/ios-arm64-unsigned-app/sspu-all-in-one-ios-arm64-unsigned-app.tar.gz
            artifacts/macos-universal-dmg/sspu-all-in-one-macos-universal.dmg
            artifacts/linux-x64-bundle/sspu-all-in-one-linux-x64.tar.gz
            artifacts/web-js-bundle/sspu-all-in-one-web-js.tar.gz
            artifacts/web-wasm-bundle/sspu-all-in-one-web-wasm.tar.gz
