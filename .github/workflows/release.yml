# 全平台 Release 工作流
# PR 合并且带 release 标签时发布，也支持手动发版。
name: Build & Release

on:
  pull_request:
    types: [closed]
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 0.1.5-alpha)'
        required: true
        default: '0.1.5-alpha'

env:
  FLUTTER_VERSION: '3.41.7'

jobs:
  build-windows:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            flutter_target_platform: windows-x64
            installer_script: .github\installer\windows-x64.iss
            bundle_path: build\windows\x64\runner\Release
            output_file: sspu-all-in-one-windows-x64-setup.exe
            artifact_name: windows-x64-installer
          - arch: arm64
            runner: windows-11-arm
            flutter_target_platform: windows-arm64
            installer_script: .github\installer\windows-arm64.iss
            bundle_path: build\windows\arm64\runner\Release
            output_file: sspu-all-in-one-windows-arm64-setup.exe
            artifact_name: windows-arm64-installer
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false

      - name: 准备版本号
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $releaseVersion = '${{ github.event.inputs.version }}'
          } else {
            $versionLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$'
            $releaseVersion = $versionLine.Matches[0].Groups[1].Value.Split('+')[0]
          }
          "APP_VERSION=$releaseVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Windows ${{ matrix.arch }}
        run: flutter build windows --release --target-platform ${{ matrix.flutter_target_platform }}

      - name: 安装 Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: 生成 Windows 安装器
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          if (-not (Test-Path '${{ matrix.bundle_path }}')) {
            throw 'Windows bundle path not found: ${{ matrix.bundle_path }}'
          }
          $innoCompiler = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          & $innoCompiler '${{ matrix.installer_script }}'

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.output_file }}

  build-linux:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-latest
            target_platform: linux-x64
            bundle_path: build/linux/x64/release/bundle
            tar_output_file: sspu-all-in-one-linux-x64.tar.gz
            deb_output_file: sspu-all-in-one-linux-x64.deb
            tar_artifact_name: linux-x64-bundle
            deb_artifact_name: linux-x64-deb
            deb_arch: amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            target_platform: linux-arm64
            bundle_path: build/linux/arm64/release/bundle
            tar_output_file: sspu-all-in-one-linux-arm64.tar.gz
            deb_output_file: sspu-all-in-one-linux-arm64.deb
            tar_artifact_name: linux-arm64-bundle
            deb_artifact_name: linux-arm64-deb
            deb_arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: 安装 Linux 依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libnotify-dev libayatana-appindicator3-dev

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false

      - name: 准备版本号
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "APP_VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          else
            release_version=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
            echo "APP_VERSION=$release_version" >> "$GITHUB_ENV"
          fi

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Linux ${{ matrix.arch }}
        run: flutter build linux --release --target-platform ${{ matrix.target_platform }}

      - name: 校验 Linux 主程序可执行权限
        run: |
          linux_executable="${{ matrix.bundle_path }}/sspu_all_in_one"
          if [ ! -f "$linux_executable" ]; then
            echo "未找到 Linux 主程序: $linux_executable" >&2
            exit 1
          fi

          chmod +x "$linux_executable"
          stat -c '%A %n' "$linux_executable"

          if [ ! -x "$linux_executable" ]; then
            echo "Linux 主程序缺少可执行权限" >&2
            exit 1
          fi

      - name: 打包 Linux 运行目录
        run: |
          cd "${{ matrix.bundle_path }}"
          tar -czf "$GITHUB_WORKSPACE/${{ matrix.tar_output_file }}" .

      - name: 校验 Linux 压缩包中的可执行权限
        run: |
          tar -tvzf "$GITHUB_WORKSPACE/${{ matrix.tar_output_file }}" | grep '^-rwxr-xr-x .* ./sspu_all_in_one$'

      - name: 构建 Linux ${{ matrix.arch }} DEB 安装包
        run: |
          package_root="$GITHUB_WORKSPACE/dist/deb-${{ matrix.arch }}"
          install_root="$package_root/usr/lib/sspu-all-in-one"
          desktop_root="$package_root/usr/share/applications"
          icon_root="$package_root/usr/share/icons/hicolor/256x256/apps"
          bin_root="$package_root/usr/bin"
          control_root="$package_root/DEBIAN"

          rm -rf "$package_root"
          mkdir -p "$install_root" "$desktop_root" "$icon_root" "$bin_root" "$control_root"

          cp -a "${{ matrix.bundle_path }}/." "$install_root/"
          cp assets/images/app_icon.png "$icon_root/sspu-all-in-one.png"

          cat > "$desktop_root/cn.qintsg.sspu_all_in_one.desktop" <<EOF
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=SSPU All-in-One
          Comment=上海第二工业大学校园综合服务应用
          Exec=/usr/lib/sspu-all-in-one/sspu_all_in_one
          Icon=sspu-all-in-one
          Terminal=false
          Categories=Education;Utility;
          StartupNotify=true
          EOF

          ln -sf ../lib/sspu-all-in-one/sspu_all_in_one "$bin_root/sspu-all-in-one"

          cat > "$control_root/control" <<EOF
          Package: sspu-all-in-one
          Version: ${{ env.APP_VERSION }}
          Section: education
          Priority: optional
          Architecture: ${{ matrix.deb_arch }}
          Maintainer: Qintsg
          Depends: libgtk-3-0, libblkid1, liblzma5
          Description: 上海第二工业大学校园综合服务应用
           聚合学校官网、教学单位、职能部门与微信公众号信息的 Flutter 客户端。
          EOF

          dpkg-deb --build --root-owner-group "$package_root" "$GITHUB_WORKSPACE/${{ matrix.deb_output_file }}"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.tar_artifact_name }}
          path: ${{ matrix.tar_output_file }}

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.deb_artifact_name }}
          path: ${{ matrix.deb_output_file }}

  build-macos:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 macOS universal
        run: flutter build macos --release

      - name: 生成 macOS DMG
        run: |
          macos_app_bundle="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$macos_app_bundle" ]; then
            echo "未找到 macOS .app 产物" >&2
            exit 1
          fi
          hdiutil create \
            -volname "SSPU All-in-One" \
            -srcfolder "$macos_app_bundle" \
            -ov \
            -format UDZO \
            "$GITHUB_WORKSPACE/sspu-all-in-one-macos-universal.dmg"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: macos-universal-dmg
          path: sspu-all-in-one-macos-universal.dmg

  build-ios:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 iOS arm64 未签名应用
        run: flutter build ios --release --no-codesign

      - name: 打包 iOS 未签名应用
        run: |
          tar -czf "$GITHUB_WORKSPACE/sspu-all-in-one-ios-arm64-unsigned-app.tar.gz" -C build/ios/iphoneos Runner.app

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ios-arm64-unsigned-app
          path: sspu-all-in-one-ios-arm64-unsigned-app.tar.gz

  build-android:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false

      - name: 安装依赖
        run: flutter pub get

      - name: 准备 Android release 签名
        shell: bash
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && \
             [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && \
             [ -n "$ANDROID_KEY_ALIAS" ] && \
             [ -n "$ANDROID_KEY_PASSWORD" ]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/ci-release.jks
            {
              printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
              printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
              printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
              printf 'storeFile=%s\n' 'app/ci-release.jks'
            } > android/key.properties
          else
            echo "Android release signing secrets are not configured; fallback signing will be used."
          fi

      - name: 构建 Android arm32 / arm64 / x64 APK
        run: flutter build apk --release --target-platform android-arm,android-arm64,android-x64 --split-per-abi

      - name: 整理 APK 产物
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/sspu-all-in-one-android-arm32.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/sspu-all-in-one-android-arm64.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk dist/sspu-all-in-one-android-x64.apk

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: android-apk
          path: |
            dist/sspu-all-in-one-android-arm32.apk
            dist/sspu-all-in-one-android-arm64.apk
            dist/sspu-all-in-one-android-x64.apk

  build-web:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: js
            build_args: ''
            output_dir: build/web-js
            output_file: sspu-all-in-one-web-js.tar.gz
            artifact_name: web-js-bundle
          - mode: wasm
            build_args: '--wasm'
            output_dir: build/web-wasm
            output_file: sspu-all-in-one-web-wasm.tar.gz
            artifact_name: web-wasm-bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: false

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Web ${{ matrix.mode }}
        run: flutter build web --release ${{ matrix.build_args }} --output ${{ matrix.output_dir }}

      - name: 打包 Web ${{ matrix.mode }} 产物
        run: |
          cd "${{ matrix.output_dir }}"
          tar -czf "$GITHUB_WORKSPACE/${{ matrix.output_file }}" .

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output_file }}

  create-release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    needs: [build-windows, build-linux, build-macos, build-ios, build-android, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: 提取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            release_version=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
            echo "version=$release_version" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: 创建 Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## SSPU All-in-One v${{ steps.version.outputs.version }}

            上海第二工业大学校园综合服务应用。

            ### Release 产物
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows x64 | `sspu-all-in-one-windows-x64-setup.exe` | 安装器 |
            | Windows arm64 | `sspu-all-in-one-windows-arm64-setup.exe` | 安装器 |
            | Android arm32 | `sspu-all-in-one-android-arm32.apk` | APK 安装包 |
            | Android arm64 | `sspu-all-in-one-android-arm64.apk` | APK 安装包 |
            | Android x64 | `sspu-all-in-one-android-x64.apk` | APK 安装包 |
            | iOS arm64 | `sspu-all-in-one-ios-arm64-unsigned-app.tar.gz` | 未签名应用包，需签名后安装 |
            | macOS universal | `sspu-all-in-one-macos-universal.dmg` | 同时支持 x64 与 arm64，未签名 |
            | Linux x64 | `sspu-all-in-one-linux-x64.tar.gz` | 运行目录压缩包 |
            | Linux x64 DEB | `sspu-all-in-one-linux-x64.deb` | Debian/Ubuntu 安装包 |
            | Linux arm64 | `sspu-all-in-one-linux-arm64.tar.gz` | 运行目录压缩包 |
            | Linux arm64 DEB | `sspu-all-in-one-linux-arm64.deb` | Debian/Ubuntu 安装包 |
            | Web JavaScript | `sspu-all-in-one-web-js.tar.gz` | 静态站点压缩包 |
            | Web WebAssembly | `sspu-all-in-one-web-wasm.tar.gz` | 静态站点压缩包 |

            ### 平台说明
            - Android 产物按 arm32、arm64、x64 拆分，减少单个安装包体积。
            - 当前仓库 Release 工作流会分别构建 Windows x64 / arm64 与 Linux x64 / arm64 产物。
            - iOS 没有仓库签名证书，Release 提供未签名应用压缩包。
            - Linux 同时提供 `tar.gz` 运行目录和 `.deb` 安装包；`.deb` 面向 Debian / Ubuntu 及其衍生发行版。
            - Linux 压缩包建议使用 `tar -xzf` 解压；若使用不保留 Unix 权限的图形工具解压后无法直接运行，请执行 `chmod +x sspu_all_in_one` 后再启动。
          draft: false
          prerelease: true
          files: |
            artifacts/windows-x64-installer/sspu-all-in-one-windows-x64-setup.exe
            artifacts/windows-arm64-installer/sspu-all-in-one-windows-arm64-setup.exe
            artifacts/android-apk/sspu-all-in-one-android-arm32.apk
            artifacts/android-apk/sspu-all-in-one-android-arm64.apk
            artifacts/android-apk/sspu-all-in-one-android-x64.apk
            artifacts/ios-arm64-unsigned-app/sspu-all-in-one-ios-arm64-unsigned-app.tar.gz
            artifacts/macos-universal-dmg/sspu-all-in-one-macos-universal.dmg
            artifacts/linux-x64-bundle/sspu-all-in-one-linux-x64.tar.gz
            artifacts/linux-x64-deb/sspu-all-in-one-linux-x64.deb
            artifacts/linux-arm64-bundle/sspu-all-in-one-linux-arm64.tar.gz
            artifacts/linux-arm64-deb/sspu-all-in-one-linux-arm64.deb
            artifacts/web-js-bundle/sspu-all-in-one-web-js.tar.gz
            artifacts/web-wasm-bundle/sspu-all-in-one-web-wasm.tar.gz
