# 全平台 Release 工作流
# PR 合并且带 release 标签时发布，也支持手动发版。
name: Build & Release

on:
  pull_request:
    types: [closed]
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 0.1.0-alpha)'
        required: true
        default: '0.1.0-alpha'

env:
  FLUTTER_VERSION: '3.41.4'

jobs:
  build-windows-x64:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 准备版本号
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $releaseVersion = '${{ github.event.inputs.version }}'
          } else {
            $versionLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$'
            $releaseVersion = $versionLine.Matches[0].Groups[1].Value.Split('+')[0]
          }
          "APP_VERSION=$releaseVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Windows x64
        run: flutter build windows --release

      - name: 安装 Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: 生成 Windows 安装器
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $innoCompiler = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          & $innoCompiler '.github\installer\windows-x64.iss'

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64-installer
          path: dist/sspu-all-in-one-windows-x64-setup.exe

  build-linux-x64:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Linux 依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev libnotify-dev libayatana-appindicator3-dev

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Linux x64
        run: flutter build linux --release

      - name: 打包 Linux 运行目录
        run: |
          cd build/linux/x64/release/bundle
          tar -czf "$GITHUB_WORKSPACE/sspu-all-in-one-linux-x64.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64-bundle
          path: sspu-all-in-one-linux-x64.tar.gz

  build-macos:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 macOS
        run: flutter build macos --release

      - name: 生成 macOS DMG
        run: |
          hdiutil create \
            -volname "SSPU All-in-One" \
            -srcfolder "build/macos/Build/Products/Release/sspu_all_in_one.app" \
            -ov \
            -format UDZO \
            "$GITHUB_WORKSPACE/sspu-all-in-one-macos.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: sspu-all-in-one-macos.dmg

  build-android:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Android arm32 / arm64 APK
        run: flutter build apk --release --target-platform android-arm,android-arm64 --split-per-abi

      - name: 整理 APK 产物
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/sspu-all-in-one-android-arm32.apk
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/sspu-all-in-one-android-arm64.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            dist/sspu-all-in-one-android-arm32.apk
            dist/sspu-all-in-one-android-arm64.apk

  build-web:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Web
        run: flutter build web --release

      - name: 打包 Web 产物
        run: |
          cd build/web
          tar -czf "$GITHUB_WORKSPACE/sspu-all-in-one-web.tar.gz" .

      - uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          path: sspu-all-in-one-web.tar.gz

  create-release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'release'))
    needs: [build-windows-x64, build-linux-x64, build-macos, build-android, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 提取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            release_version=$(grep '^version:' pubspec.yaml | sed 's/version: //;s/+.*//')
            echo "version=$release_version" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## SSPU All-in-One v${{ steps.version.outputs.version }}

            上海第二工业大学校园综合服务应用。

            ### Release 产物
            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows x64 | `sspu-all-in-one-windows-x64-setup.exe` | 安装器 |
            | Android arm32 | `sspu-all-in-one-android-arm32.apk` | APK 安装包 |
            | Android arm64 | `sspu-all-in-one-android-arm64.apk` | APK 安装包 |
            | macOS | `sspu-all-in-one-macos.dmg` | DMG 安装镜像，未签名 |
            | Linux x64 | `sspu-all-in-one-linux-x64.tar.gz` | 运行目录压缩包 |
            | Web | `sspu-all-in-one-web.tar.gz` | 静态站点压缩包 |

            ### 平台说明
            - Android 产物按 arm32 与 arm64 拆分，减少单个安装包体积。
            - Flutter 当前 Windows 发布目标不包含 32 位 x86，本工作流发布 Windows x64 安装器。
            - Linux 与 Web 暂无仓库内安装器配置，保留压缩包形式。
          draft: false
          prerelease: true
          files: |
            artifacts/windows-x64-installer/sspu-all-in-one-windows-x64-setup.exe
            artifacts/android-apk/sspu-all-in-one-android-arm32.apk
            artifacts/android-apk/sspu-all-in-one-android-arm64.apk
            artifacts/macos-dmg/sspu-all-in-one-macos.dmg
            artifacts/linux-x64-bundle/sspu-all-in-one-linux-x64.tar.gz
            artifacts/web-bundle/sspu-all-in-one-web.tar.gz
