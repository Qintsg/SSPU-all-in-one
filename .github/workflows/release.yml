# Release 工作流
# 公开 Release 只在带 release 标签的 PR merge 后触发，版本、Tag 与资产命名统一来自 pubspec.yaml。
name: Build & Release

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - develop
      - release/**
  workflow_dispatch:
    inputs:
      base_ref:
        description: '本次手动发布对应的目标分支（正式版填 main；预发布填 main / develop / release/*）'
        required: true
        default: 'develop'
      release_notes:
        description: '手动触发时使用的 Release Notes，必须包含标准 7 个章节'
        required: true

env:
  FLUTTER_VERSION: '3.41.7'
  FLUTTER_GIT_URL: 'https://github.com/flutter/flutter.git'

permissions:
  contents: read

jobs:
  prepare:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        contains(github.event.pull_request.labels.*.name, 'release')
      )
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      version_core: ${{ steps.release.outputs.version_core }}
      channel: ${{ steps.release.outputs.channel }}
      build_number: ${{ steps.release.outputs.build_number }}
      tag: ${{ steps.release.outputs.tag }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      release_title: ${{ steps.release.outputs.release_title }}
    steps:
      - uses: actions/checkout@v6.0.2

      - id: release
        uses: ./.github/actions/release-context

      - name: 校验触发分支
        shell: bash
        run: |
          set -euo pipefail

          if [[ '${{ github.event_name }}' == 'workflow_dispatch' ]]; then
            base_ref='${{ github.event.inputs.base_ref }}'
          else
            base_ref='${{ github.event.pull_request.base.ref }}'
          fi

          channel='${{ steps.release.outputs.channel }}'

          if [[ "$channel" == "stable" ]]; then
            [[ "$base_ref" == "main" ]] || {
              echo "正式 Release 必须由 main 分支上的 release PR merge 触发。" >&2
              exit 1
            }
            exit 0
          fi

          if [[ "$base_ref" != "main" && "$base_ref" != "develop" && ! "$base_ref" =~ ^release/ ]]; then
            echo "预发布 Release 仅允许从 main、develop 或 release/* 触发，当前目标分支为 $base_ref。" >&2
            exit 1
          fi

  build-android:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 准备 Android Release 签名
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${ANDROID_KEYSTORE_BASE64:-}" && \
                -n "${ANDROID_KEYSTORE_PASSWORD:-}" && \
                -n "${ANDROID_KEY_ALIAS:-}" && \
                -n "${ANDROID_KEY_PASSWORD:-}" ]]; then
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/ci-release.jks
            {
              printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
              printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
              printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
              printf 'storeFile=%s\n' 'app/ci-release.jks'
            } > android/key.properties
          else
            echo "未配置 Android Release 签名 Secrets，当前将退回到仓库中的 debug 签名策略。"
          fi

      - name: 构建 Android Universal APK
        run: flutter build apk --release

      - name: 整理 Android 产物
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-android-universal.apk"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: android-universal
          path: dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-android-universal.apk

  build-windows:
    needs: prepare
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Windows x64
        run: flutter build windows --release

      - name: 安装 Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: 生成 Windows 安装器
        shell: pwsh
        run: |
          $installerCompiler = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'
          if (-not (Test-Path $installerCompiler)) {
            throw "未找到 Inno Setup 编译器：$installerCompiler"
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & $installerCompiler '.github\installer\windows-x64.iss'

      - name: 生成 Windows Portable ZIP
        shell: pwsh
        run: |
          $portableRoot = Join-Path $env:RUNNER_TEMP 'SSPU-All-in-One'
          $portableFile = "dist\SSPU-All-in-One-v${env:APP_VERSION}-windows-x64-portable.zip"

          if (Test-Path $portableRoot) {
            Remove-Item -LiteralPath $portableRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $portableRoot | Out-Null
          Copy-Item -Path 'build\windows\x64\runner\Release\*' -Destination $portableRoot -Recurse

          if (Test-Path $portableFile) {
            Remove-Item -LiteralPath $portableFile -Force
          }

          Compress-Archive -Path $portableRoot -DestinationPath $portableFile

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-assets
          path: |
            dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-windows-x64-installer.exe
            dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-windows-x64-portable.zip

  build-windows-arm64:
    needs: prepare
    runs-on: windows-11-arm
    env:
      APP_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: '21'
          architecture: x64

      - name: 安装 Flutter arm64 SDK
        shell: pwsh
        run: |
          $flutterRoot = Join-Path $env:RUNNER_TEMP 'flutter-sdk'
          if (Test-Path $flutterRoot) {
            Remove-Item -LiteralPath $flutterRoot -Recurse -Force
          }

          git clone --filter=blob:none --branch stable $env:FLUTTER_GIT_URL $flutterRoot
          git -C $flutterRoot fetch --depth 1 origin "refs/tags/$env:FLUTTER_VERSION:refs/tags/$env:FLUTTER_VERSION"
          git -C $flutterRoot checkout "tags/$env:FLUTTER_VERSION"

          "$($flutterRoot)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          & "$flutterRoot\bin\flutter.bat" config --enable-windows-desktop
          & "$flutterRoot\bin\flutter.bat" precache --windows

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Windows arm64
        run: flutter build windows --release

      - name: 定位 Windows arm64 构建目录
        shell: pwsh
        run: |
          $windowsExecutables = Get-ChildItem -Path 'build\windows' -Filter 'sspu_all_in_one.exe' -Recurse
          if ($windowsExecutables.Count -eq 0) {
            Get-ChildItem -Path 'build\windows' -Recurse | Select-Object FullName
            throw '未找到 Windows arm64 构建产物中的主程序。'
          }

          $bundlePath = $windowsExecutables[0].Directory.FullName
          "WINDOWS_ARM64_BUNDLE_DIR=$bundlePath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Windows arm64 bundle path: $bundlePath"

      - name: 安装 Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: 生成 Windows arm64 安装器
        shell: pwsh
        run: |
          $installerCompiler = Join-Path ${env:ProgramFiles(x86)} 'Inno Setup 6\ISCC.exe'

          if (-not (Test-Path $installerCompiler)) {
            throw "未找到 Inno Setup 编译器：$installerCompiler"
          }

          if (-not (Test-Path $env:WINDOWS_ARM64_BUNDLE_DIR)) {
            throw "未找到 Windows arm64 构建目录：$env:WINDOWS_ARM64_BUNDLE_DIR"
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          & $installerCompiler '.github\installer\windows-arm64.iss'

      - name: 生成 Windows arm64 Portable ZIP
        shell: pwsh
        run: |
          $bundlePath = $env:WINDOWS_ARM64_BUNDLE_DIR
          $portableRoot = Join-Path $env:RUNNER_TEMP 'SSPU-All-in-One'
          $portableFile = "dist\SSPU-All-in-One-v${env:APP_VERSION}-windows-arm64-portable.zip"

          if (Test-Path $portableRoot) {
            Remove-Item -LiteralPath $portableRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $portableRoot | Out-Null
          Copy-Item -Path "$bundlePath\*" -Destination $portableRoot -Recurse

          if (Test-Path $portableFile) {
            Remove-Item -LiteralPath $portableFile -Force
          }

          Compress-Archive -Path $portableRoot -DestinationPath $portableFile

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-arm64-assets
          path: |
            dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-windows-arm64-installer.exe
            dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-windows-arm64-portable.zip

  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 macOS universal
        run: flutter build macos --release

      - name: 生成 macOS DMG
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          macos_app_bundle="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)"
          [[ -n "$macos_app_bundle" ]] || {
            echo "未找到 macOS .app 产物。" >&2
            exit 1
          }

          # Flutter/Xcode 可能在最终签名中残留 sandbox 相关 entitlement，打包前统一剥离。
          codesign --force --deep --sign - "$macos_app_bundle"
          codesign --verify --deep --strict --verbose=2 "$macos_app_bundle"

          app_entitlements="$(codesign -d --entitlements :- "$macos_app_bundle" 2>/dev/null || true)"
          if printf '%s\n' "$app_entitlements" | grep -Eq 'com\.apple\.security\.|keychain-access-groups'; then
            printf '%s\n' "$app_entitlements" >&2
            echo "unsigned macOS 产物不得携带 App Sandbox 或 Keychain Access Groups 等受限 entitlement。" >&2
            exit 1
          fi

          hdiutil create \
            -volname "SSPU All-in-One" \
            -srcfolder "$macos_app_bundle" \
            -ov \
            -format UDZO \
            "dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-macos-universal-unsigned.dmg"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: macos-dmg
          path: dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-macos-universal-unsigned.dmg

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_CHANNEL: ${{ needs.prepare.outputs.channel }}
      RELEASE_BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: 安装 Linux 打包依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ninja-build \
            libgtk-3-dev \
            libnotify-dev \
            libsecret-1-dev \
            libayatana-appindicator3-dev \
            desktop-file-utils \
            fakeroot \
            file \
            patchelf \
            rpm \
            ruby \
            ruby-dev \
            wget
          sudo gem install --no-document fpm

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Linux x64
        run: flutter build linux --release --target-platform linux-x64

      - name: 校验 Linux 主程序
        shell: bash
        run: |
          set -euo pipefail
          linux_executable='build/linux/x64/release/bundle/sspu_all_in_one'
          [[ -f "$linux_executable" ]] || {
            echo "未找到 Linux 主程序：$linux_executable" >&2
            exit 1
          }
          chmod +x "$linux_executable"
          [[ -x "$linux_executable" ]] || {
            echo "Linux 主程序缺少可执行权限。" >&2
            exit 1
          }

      - name: 生成 Linux Release 产物
        shell: bash
        run: |
          set -euo pipefail

          bundle_dir='build/linux/x64/release/bundle'
          stage_dir="$GITHUB_WORKSPACE/dist/stage"
          package_name='sspu-all-in-one'
          numeric_version="$(printf '%s' "$RELEASE_VERSION" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"
          rpm_release="$RELEASE_BUILD_NUMBER"

          if [[ "$RELEASE_CHANNEL" != "stable" ]]; then
            rpm_release="0.${RELEASE_CHANNEL}.${RELEASE_BUILD_NUMBER}"
          fi

          rm -rf "$stage_dir"
          mkdir -p "$stage_dir" "$GITHUB_WORKSPACE/dist"

          # 便携包根目录固定为应用目录，避免用户解压后得到多层临时目录。
          portable_root="$stage_dir/portable/SSPU-All-in-One"
          mkdir -p "$portable_root"
          cp -a "$bundle_dir/." "$portable_root/"
          tar -C "$stage_dir/portable" \
            -czf "$GITHUB_WORKSPACE/dist/SSPU-All-in-One-v${RELEASE_VERSION}-linux-x64-portable.tar.gz" \
            SSPU-All-in-One

          deb_root="$stage_dir/deb"
          install_root="$deb_root/usr/lib/sspu-all-in-one"
          desktop_root="$deb_root/usr/share/applications"
          icon_root="$deb_root/usr/share/icons/hicolor/256x256/apps"
          bin_root="$deb_root/usr/bin"
          control_root="$deb_root/DEBIAN"

          mkdir -p "$install_root" "$desktop_root" "$icon_root" "$bin_root" "$control_root"
          cp -a "$bundle_dir/." "$install_root/"
          install -Dm644 assets/images/app_icon.png "$icon_root/sspu-all-in-one.png"

          cat > "$desktop_root/cn.qintsg.sspu_all_in_one.desktop" <<'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=SSPU All-in-One
          Comment=上海第二工业大学校园综合服务应用
          Exec=/usr/lib/sspu-all-in-one/sspu_all_in_one
          Icon=sspu-all-in-one
          Terminal=false
          Categories=Education;Utility;
          StartupNotify=true
          EOF

          ln -sf ../lib/sspu-all-in-one/sspu_all_in_one "$bin_root/sspu-all-in-one"

          cat > "$control_root/control" <<EOF
          Package: sspu-all-in-one
          Version: ${RELEASE_VERSION}
          Section: education
          Priority: optional
          Architecture: amd64
          Maintainer: Qintsg
          Depends: libgtk-3-0, libblkid1, liblzma5
          Description: 上海第二工业大学校园综合服务应用
           聚合学校官网、教学单位、职能部门与微信公众号信息的 Flutter 客户端。
          EOF

          dpkg-deb --build --root-owner-group \
            "$deb_root" \
            "$GITHUB_WORKSPACE/dist/SSPU-All-in-One-v${RELEASE_VERSION}-linux-x64-deb.deb"

          rpm_root="$stage_dir/rpm"
          rpm_install_root="$rpm_root/usr/lib/sspu-all-in-one"
          rpm_desktop_root="$rpm_root/usr/share/applications"
          rpm_icon_root="$rpm_root/usr/share/icons/hicolor/256x256/apps"
          rpm_bin_root="$rpm_root/usr/bin"

          mkdir -p "$rpm_install_root" "$rpm_desktop_root" "$rpm_icon_root" "$rpm_bin_root"
          cp -a "$bundle_dir/." "$rpm_install_root/"
          install -Dm644 assets/images/app_icon.png "$rpm_icon_root/sspu-all-in-one.png"
          cp "$desktop_root/cn.qintsg.sspu_all_in_one.desktop" "$rpm_desktop_root/cn.qintsg.sspu_all_in_one.desktop"
          ln -sf ../lib/sspu-all-in-one/sspu_all_in_one "$rpm_bin_root/sspu-all-in-one"

          fpm -s dir -t rpm \
            -n "$package_name" \
            -v "$numeric_version" \
            --iteration "$rpm_release" \
            --architecture x86_64 \
            --description '上海第二工业大学校园综合服务应用' \
            --url 'https://github.com/Qintsg/SSPU-all-in-one' \
            --package "$GITHUB_WORKSPACE/dist/SSPU-All-in-One-v${RELEASE_VERSION}-linux-x64-rpm.rpm" \
            -C "$rpm_root" .

          appdir_root="$stage_dir/AppDir"
          mkdir -p \
            "$appdir_root/usr/lib/sspu-all-in-one" \
            "$appdir_root/usr/share/applications" \
            "$appdir_root/usr/share/icons/hicolor/256x256/apps"
          cp -a "$bundle_dir/." "$appdir_root/usr/lib/sspu-all-in-one/"
          cp "$desktop_root/cn.qintsg.sspu_all_in_one.desktop" \
            "$appdir_root/usr/share/applications/cn.qintsg.sspu_all_in_one.desktop"
          cp assets/images/app_icon.png \
            "$appdir_root/usr/share/icons/hicolor/256x256/apps/sspu-all-in-one.png"

          cat > "$appdir_root/AppRun" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          APPDIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export LD_LIBRARY_PATH="$APPDIR/usr/lib/sspu-all-in-one:${LD_LIBRARY_PATH:-}"
          exec "$APPDIR/usr/lib/sspu-all-in-one/sspu_all_in_one" "$@"
          EOF

          chmod +x "$appdir_root/AppRun"
          ln -sf usr/share/applications/cn.qintsg.sspu_all_in_one.desktop "$appdir_root/sspu-all-in-one.desktop"
          ln -sf usr/share/icons/hicolor/256x256/apps/sspu-all-in-one.png "$appdir_root/sspu-all-in-one.png"

          wget -q \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O "$stage_dir/appimagetool.AppImage"
          chmod +x "$stage_dir/appimagetool.AppImage"
          ARCH=x86_64 "$stage_dir/appimagetool.AppImage" --appimage-extract-and-run \
            "$appdir_root" \
            "$GITHUB_WORKSPACE/dist/SSPU-All-in-One-v${RELEASE_VERSION}-linux-x64-appimage.AppImage"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: linux-assets
          path: |
            dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-linux-x64-appimage.AppImage
            dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-linux-x64-deb.deb
            dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-linux-x64-rpm.rpm
            dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-linux-x64-portable.tar.gz

  build-linux-arm64:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_CHANNEL: ${{ needs.prepare.outputs.channel }}
      RELEASE_BUILD_NUMBER: ${{ needs.prepare.outputs.build_number }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: 安装 Linux arm64 打包依赖
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            ninja-build \
            libgtk-3-dev \
            libnotify-dev \
            libsecret-1-dev \
            libayatana-appindicator3-dev \
            desktop-file-utils \
            fakeroot \
            file \
            patchelf \
            rpm \
            ruby \
            ruby-dev \
            wget
          sudo gem install --no-document fpm

      - name: 安装 Flutter arm64 SDK
        shell: bash
        run: |
          set -euo pipefail

          flutter_root="$RUNNER_TEMP/flutter-sdk"
          rm -rf "$flutter_root"

          git clone --filter=blob:none --branch stable "$FLUTTER_GIT_URL" "$flutter_root"
          git -C "$flutter_root" fetch --depth 1 origin "refs/tags/$FLUTTER_VERSION:refs/tags/$FLUTTER_VERSION"
          git -C "$flutter_root" checkout "tags/$FLUTTER_VERSION"

          echo "$flutter_root/bin" >> "$GITHUB_PATH"
          "$flutter_root/bin/flutter" config --enable-linux-desktop
          "$flutter_root/bin/flutter" precache --linux

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Linux arm64
        run: flutter build linux --release --target-platform linux-arm64

      - name: 生成 Linux arm64 Release 产物
        shell: bash
        run: |
          set -euo pipefail

          bundle_dir='build/linux/arm64/release/bundle'
          stage_dir="$GITHUB_WORKSPACE/dist/stage"
          package_name='sspu-all-in-one'
          numeric_version="$(printf '%s' "$RELEASE_VERSION" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"
          rpm_release="$RELEASE_BUILD_NUMBER"

          if [[ "$RELEASE_CHANNEL" != "stable" ]]; then
            rpm_release="0.${RELEASE_CHANNEL}.${RELEASE_BUILD_NUMBER}"
          fi

          [[ -f "$bundle_dir/sspu_all_in_one" ]] || {
            echo "未找到 Linux arm64 主程序：$bundle_dir/sspu_all_in_one" >&2
            exit 1
          }

          chmod +x "$bundle_dir/sspu_all_in_one"
          rm -rf "$stage_dir"
          mkdir -p "$stage_dir" "$GITHUB_WORKSPACE/dist"

          portable_root="$stage_dir/portable/SSPU-All-in-One"
          mkdir -p "$portable_root"
          cp -a "$bundle_dir/." "$portable_root/"
          tar -C "$stage_dir/portable" \
            -czf "$GITHUB_WORKSPACE/dist/SSPU-All-in-One-v${RELEASE_VERSION}-linux-arm64-portable.tar.gz" \
            SSPU-All-in-One

          deb_root="$stage_dir/deb"
          install_root="$deb_root/usr/lib/sspu-all-in-one"
          desktop_root="$deb_root/usr/share/applications"
          icon_root="$deb_root/usr/share/icons/hicolor/256x256/apps"
          bin_root="$deb_root/usr/bin"
          control_root="$deb_root/DEBIAN"

          mkdir -p "$install_root" "$desktop_root" "$icon_root" "$bin_root" "$control_root"
          cp -a "$bundle_dir/." "$install_root/"
          install -Dm644 assets/images/app_icon.png "$icon_root/sspu-all-in-one.png"

          cat > "$desktop_root/cn.qintsg.sspu_all_in_one.desktop" <<'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=SSPU All-in-One
          Comment=上海第二工业大学校园综合服务应用
          Exec=/usr/lib/sspu-all-in-one/sspu_all_in_one
          Icon=sspu-all-in-one
          Terminal=false
          Categories=Education;Utility;
          StartupNotify=true
          EOF

          ln -sf ../lib/sspu-all-in-one/sspu_all_in_one "$bin_root/sspu-all-in-one"

          cat > "$control_root/control" <<EOF
          Package: sspu-all-in-one
          Version: ${RELEASE_VERSION}
          Section: education
          Priority: optional
          Architecture: arm64
          Maintainer: Qintsg
          Depends: libgtk-3-0, libblkid1, liblzma5
          Description: 上海第二工业大学校园综合服务应用
           聚合学校官网、教学单位、职能部门与微信公众号信息的 Flutter 客户端。
          EOF

          dpkg-deb --build --root-owner-group \
            "$deb_root" \
            "$GITHUB_WORKSPACE/dist/SSPU-All-in-One-v${RELEASE_VERSION}-linux-arm64-deb.deb"

          rpm_root="$stage_dir/rpm"
          rpm_install_root="$rpm_root/usr/lib/sspu-all-in-one"
          rpm_desktop_root="$rpm_root/usr/share/applications"
          rpm_icon_root="$rpm_root/usr/share/icons/hicolor/256x256/apps"
          rpm_bin_root="$rpm_root/usr/bin"

          mkdir -p "$rpm_install_root" "$rpm_desktop_root" "$rpm_icon_root" "$rpm_bin_root"
          cp -a "$bundle_dir/." "$rpm_install_root/"
          install -Dm644 assets/images/app_icon.png "$rpm_icon_root/sspu-all-in-one.png"
          cp "$desktop_root/cn.qintsg.sspu_all_in_one.desktop" "$rpm_desktop_root/cn.qintsg.sspu_all_in_one.desktop"
          ln -sf ../lib/sspu-all-in-one/sspu_all_in_one "$rpm_bin_root/sspu-all-in-one"

          fpm -s dir -t rpm \
            -n "$package_name" \
            -v "$numeric_version" \
            --iteration "$rpm_release" \
            --architecture aarch64 \
            --description '上海第二工业大学校园综合服务应用' \
            --url 'https://github.com/Qintsg/SSPU-all-in-one' \
            --package "$GITHUB_WORKSPACE/dist/SSPU-All-in-One-v${RELEASE_VERSION}-linux-arm64-rpm.rpm" \
            -C "$rpm_root" .

          appdir_root="$stage_dir/AppDir"
          mkdir -p \
            "$appdir_root/usr/lib/sspu-all-in-one" \
            "$appdir_root/usr/share/applications" \
            "$appdir_root/usr/share/icons/hicolor/256x256/apps"
          cp -a "$bundle_dir/." "$appdir_root/usr/lib/sspu-all-in-one/"
          cp "$desktop_root/cn.qintsg.sspu_all_in_one.desktop" \
            "$appdir_root/usr/share/applications/cn.qintsg.sspu_all_in_one.desktop"
          cp assets/images/app_icon.png \
            "$appdir_root/usr/share/icons/hicolor/256x256/apps/sspu-all-in-one.png"

          cat > "$appdir_root/AppRun" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          APPDIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export LD_LIBRARY_PATH="$APPDIR/usr/lib/sspu-all-in-one:${LD_LIBRARY_PATH:-}"
          exec "$APPDIR/usr/lib/sspu-all-in-one/sspu_all_in_one" "$@"
          EOF

          chmod +x "$appdir_root/AppRun"
          ln -sf usr/share/applications/cn.qintsg.sspu_all_in_one.desktop "$appdir_root/sspu-all-in-one.desktop"
          ln -sf usr/share/icons/hicolor/256x256/apps/sspu-all-in-one.png "$appdir_root/sspu-all-in-one.png"

          wget -q \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-aarch64.AppImage \
            -O "$stage_dir/appimagetool.AppImage"
          chmod +x "$stage_dir/appimagetool.AppImage"
          ARCH=aarch64 "$stage_dir/appimagetool.AppImage" --appimage-extract-and-run \
            "$appdir_root" \
            "$GITHUB_WORKSPACE/dist/SSPU-All-in-One-v${RELEASE_VERSION}-linux-arm64-appimage.AppImage"

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: linux-arm64-assets
          path: |
            dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-linux-arm64-appimage.AppImage
            dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-linux-arm64-deb.deb
            dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-linux-arm64-rpm.rpm
            dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-linux-arm64-portable.tar.gz

  build-web:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 Web
        run: flutter build web --release

      - name: 打包 Web 静态站点
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cd build/web
          zip -r \
            "$GITHUB_WORKSPACE/dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-web-universal-static.zip" \
            .

      - uses: actions/upload-artifact@v7.0.1
        with:
          name: web-static
          path: dist/SSPU-All-in-One-v${{ needs.prepare.outputs.version }}-web-universal-static.zip

  publish:
    if: needs.prepare.result == 'success'
    needs:
      [
        prepare,
        build-android,
        build-windows,
        build-windows-arm64,
        build-macos,
        build-linux,
        build-linux-arm64,
        build-web,
      ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: 生成 Release Notes
        shell: bash
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          MANUAL_RELEASE_NOTES: ${{ github.event.inputs.release_notes }}
        run: |
          set -euo pipefail

          if [[ '${{ github.event_name }}' == 'workflow_dispatch' ]]; then
            printf '%s' "$MANUAL_RELEASE_NOTES" > pr-body.md
          else
            printf '%s' "$PR_BODY" > pr-body.md
          fi

          python scripts/release/render_release_notes.py \
            --body-file pr-body.md \
            --output dist/release-notes.md

      - name: 收集工具链版本
        id: toolchain
        shell: bash
        run: |
          set -euo pipefail
          flutter_version="$(flutter --version --machine | python -c "import json,sys; print(json.load(sys.stdin)['frameworkVersion'])")"
          dart_version="$(dart --version 2>&1 | awk '{print $4}')"
          release_date="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          {
            echo "flutter_version=$flutter_version"
            echo "dart_version=$dart_version"
            echo "release_date=$release_date"
          } >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/generate-release-metadata
        with:
          asset-dir: dist
          version: ${{ needs.prepare.outputs.version }}
          channel: ${{ needs.prepare.outputs.channel }}
          build-number: ${{ needs.prepare.outputs.build_number }}
          tag: ${{ needs.prepare.outputs.tag }}
          release-date: ${{ steps.toolchain.outputs.release_date }}
          flutter-version: ${{ steps.toolchain.outputs.flutter_version }}
          dart-version: ${{ steps.toolchain.outputs.dart_version }}

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: ${{ needs.prepare.outputs.release_title }}
          body_path: dist/release-notes.md
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          files: dist/*
