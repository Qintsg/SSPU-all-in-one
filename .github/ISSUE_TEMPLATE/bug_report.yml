name: Bug 反馈
description: 报告程序错误、异常行为或崩溃问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈 Bug！请尽量提供完整信息，方便我们复现和修复。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简要说明你遇到了什么问题。
      placeholder: 例如：点击登录按钮后页面无响应。
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 请按步骤写出如何复现该问题。
      placeholder: |
        1. 打开...
        2. 点击...
        3. 出现...
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      placeholder: 你原本期望发生什么？
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      placeholder: 实际发生了什么？
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: 项目版本 / Commit / Branch
      placeholder: v1.0.0 / commit hash / branch name
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 运行环境
      options:
        - Windows
        - macOS
        - Linux
        - Android
        - iOS
        - Web
        - 其他
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 可以粘贴报错日志、控制台输出或截图。
      render: shell
    validations:
      required: false