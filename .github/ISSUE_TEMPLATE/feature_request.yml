name: 功能请求
description: 提出新功能、体验改进或平台能力补充
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        请描述真实使用场景和可验证结果，便于评估优先级、影响范围和实现边界。
  - type: textarea
    id: problem
    attributes:
      label: 背景问题
      description: 当前有什么不便、缺口或限制？
      placeholder: 例如：用户无法按学院筛选消息，导致消息列表定位成本较高。
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 期望目标
      description: 说明完成后用户可以做什么。
      placeholder: 例如：用户可以在信息中心按学院筛选消息来源。
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 期望优先级
      options:
        - 高
        - 中
        - 低
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      multiple: true
      options:
        - 首页
        - 信息中心
        - 微信 / 微信读书
        - 快捷链接
        - 设置
        - 通知 / 后台刷新
        - Android
        - Windows
        - macOS
        - Linux
        - Web
        - 文档
        - CI / Release
        - 不确定
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 描述你期望的交互、配置项、入口位置或数据处理方式。
    validations:
      required: true
  - type: textarea
    id: non_goals
    attributes:
      label: 非目标 / 不包含项
      description: 写明这次需求明确不打算覆盖的范围，避免范围蔓延。
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 如果已有临时绕过方式或其他实现思路，请写在这里。
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 用可检查的条目说明什么情况算完成。
      placeholder: |
        - 可以按学院筛选消息
        - 刷新后筛选状态保持不变
        - 空结果时显示明确提示
    validations:
      required: true
  - type: textarea
    id: risks
    attributes:
      label: 约束与风险
      description: 写明兼容性、权限、账号、平台差异或数据来源限制。
  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前检查
      options:
        - label: 我已确认该需求不是重复 Issue
          required: true
        - label: 我已提供可验证的完成标准
          required: true
        - label: 我已说明本次需求的优先级和非目标范围
          required: true
