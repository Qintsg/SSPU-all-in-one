name: 功能请求
description: 提出新功能、改进建议或体验优化
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你遇到的问题
      description: 这个功能是为了解决什么问题？
      placeholder: 例如：目前无法批量导入数据，操作效率较低。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望这个功能如何工作？
      placeholder: 例如：希望支持上传 CSV 文件并自动解析。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 有没有其他可接受的实现方式？
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: 优先级
      options:
        - 低
        - 中
        - 高
        - 紧急
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 可以添加截图、参考链接、类似产品等。
    validations:
      required: false