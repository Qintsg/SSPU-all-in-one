# 自动标签规则 — 根据文件路径匹配
# 参考：https://github.com/actions/labeler

# 前端 / Flutter UI
frontend:
  - changed-files:
      - any-glob-to-any-file:
          - 'lib/pages/**'
          - 'lib/widgets/**'
          - 'lib/theme/**'

# 后端 / 服务层
services:
  - changed-files:
      - any-glob-to-any-file:
          - 'lib/services/**'

# 数据模型
models:
  - changed-files:
      - any-glob-to-any-file:
          - 'lib/models/**'

# Android 平台
android:
  - changed-files:
      - any-glob-to-any-file:
          - 'android/**'

# iOS 平台
ios:
  - changed-files:
      - any-glob-to-any-file:
          - 'ios/**'

# macOS 平台
macos:
  - changed-files:
      - any-glob-to-any-file:
          - 'macos/**'

# Linux 平台
linux:
  - changed-files:
      - any-glob-to-any-file:
          - 'linux/**'

# Windows 平台
windows:
  - changed-files:
      - any-glob-to-any-file:
          - 'windows/**'

# Web 平台
web:
  - changed-files:
      - any-glob-to-any-file:
          - 'web/**'

# CI/CD
ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/**'

# 文档
documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - '*.md'

# 依赖
dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'pubspec.yaml'
          - 'pubspec.lock'
          - '**/Podfile'
          - '**/Podfile.lock'
          - '**/build.gradle.kts'
