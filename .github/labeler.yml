# 自动标签规则 — 根据文件路径匹配
# 参考：https://github.com/actions/labeler

frontend:
  - changed-files:
      - any-glob-to-any-file:
          - 'lib/app.dart'
          - 'lib/main.dart'
          - 'lib/pages/**'
          - 'lib/widgets/**'
          - 'lib/theme/**'

services:
  - changed-files:
      - any-glob-to-any-file:
          - 'lib/services/**'

models:
  - changed-files:
      - any-glob-to-any-file:
          - 'lib/models/**'

android:
  - changed-files:
      - any-glob-to-any-file:
          - 'android/**'

ios:
  - changed-files:
      - any-glob-to-any-file:
          - 'ios/**'

macos:
  - changed-files:
      - any-glob-to-any-file:
          - 'macos/**'

linux:
  - changed-files:
      - any-glob-to-any-file:
          - 'linux/**'

windows:
  - changed-files:
      - any-glob-to-any-file:
          - 'windows/**'

web:
  - changed-files:
      - any-glob-to-any-file:
          - 'web/**'

ci:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'

# Release 相关文件变更
# 注意：`release` 标签保留给人工触发 Release 工作流，不在这里自动添加。
release-files:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/release.yml'
          - '.github/installer/**'

governance:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/ISSUE_TEMPLATE/**'
          - '.github/pull_request_template.md'
          - '.github/CODEOWNERS'
          - '.github/dependabot.yml'
          - '.github/labeler.yml'
          - '.github/分支命名规范.md'

documentation:
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - 'README.md'
          - 'AGENTS.md'

dependencies:
  - changed-files:
      - any-glob-to-any-file:
          - 'pubspec.yaml'
          - 'pubspec.lock'
          - 'analysis_options.yaml'
          - 'android/**/*.gradle'
          - 'android/**/*.gradle.kts'
          - 'android/gradle/wrapper/**'
          - '**/Podfile'
          - '**/Podfile.lock'
